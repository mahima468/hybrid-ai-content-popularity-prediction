services:
  - type: web
    name: hybridai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HF_API_KEY
        sync: false   # set manually in Render dashboard
    plan: free
